<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Competitive Time Machine</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <h1><span class="material-symbols-outlined logo-icon">bolt</span>Time Machine</h1>
      </div>
      
      <nav class="competitors-nav">
        <h2>Competitors</h2>
        <ul id="competitor-list">
          <!-- Populated by JS -->
        </ul>
      </nav>
      
      <div class="sidebar-footer">
        <button id="refresh-btn" class="btn btn-secondary">↻ Refresh Data</button>
      </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
      <!-- Page Navigation -->
      <div class="page-nav hidden" id="page-nav">
        <h2 class="nav-section-title">Shopping Journey</h2>
        <!-- Buttons populated by JS -->
      </div>
      
      <!-- Timeline Row -->
      <div class="timeline-row">
        <div class="timeline" id="timeline">
          <!-- Date items populated by JS -->
          <!-- Hidden breadcrumb state elements -->
          <span id="current-competitor" style="display:none">Select a competitor</span>
          <span id="current-page" style="display:none">-</span>
        </div>
        <div class="timeline-controls hidden">
          <div class="viewport-toggle">
            <button id="viewport-desktop" class="btn btn-toggle active">Desktop</button>
            <button id="viewport-mobile" class="btn btn-toggle">Mobile</button>
          </div>
          <div class="view-mode">
            <button id="mode-sidebyside" class="btn btn-toggle active">Side by Side</button>
            <button id="mode-diff" class="btn btn-toggle">Diff Overlay</button>
            <button id="mode-slider" class="btn btn-toggle">Slider</button>
          </div>
        </div>
      </div>
      
      <!-- Content Area -->
      <div class="content-area">
        <!-- Screenshot Viewer -->
        <div class="screenshot-viewer" id="screenshot-viewer">
          <div class="viewer-panel" id="viewer-panel">
            <!-- View content injected by JS -->
            <div class="empty-state">
              <p>👈 Select a competitor and page to begin</p>
            </div>
          </div>
        </div>
        
      </div>
      
      <!-- Analysis Panel -->
      <aside class="analysis-panel" id="analysis-panel">
        <div class="panel-header">
          <button id="toggle-analysis" class="btn btn-icon toggle-arrow" title="Toggle Analysis Panel"><span class="material-symbols-outlined">chevron_right</span></button>
          <div class="panel-header-title">
            <h3>Analysis</h3>
            <span id="analysis-date" class="analysis-date"></span>
          </div>
        </div>
        
        <div class="panel-content">
          <!-- Change Summary -->
          <section class="analysis-section">
            <h4>Change Summary</h4>
            <div class="change-stats" id="change-stats">
              <div class="stat">
                <span class="stat-label">Desktop</span>
                <span class="stat-value" id="stat-desktop">-</span>
              </div>
              <div class="stat">
                <span class="stat-label">Mobile</span>
                <span class="stat-value" id="stat-mobile">-</span>
              </div>
            </div>
          </section>
          
          <!-- AI Insights -->
          <section class="analysis-section">
            <h4>AI Insights</h4>
            <div id="ai-insights" class="insights-content">
              <p class="placeholder">No analysis available yet.</p>
              <p class="placeholder hint">Run AI analysis in your IDE to populate this section.</p>
            </div>
          </section>
          
          <!-- Notes -->
          <section class="analysis-section">
            <h4>Notes</h4>
            <textarea id="notes-input" placeholder="Add your observations..."></textarea>
            <button id="save-notes" class="btn btn-primary">Save Notes</button>
            <div id="notes-list"></div>
          </section>
        </div>
      </aside>
    </main>
  </div>
  
  <script src="viewer.js"></script>
</body>
</html>
